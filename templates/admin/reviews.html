{% extends 'admin/_base.html' %}{% set active='reviews' %}{% block adm %}
<h1>Отзывы</h1>
<form method="get" style="margin-bottom:16px"><input class="input" name="q" value="{{ q }}" placeholder="🔍 Поиск по тексту" style="max-width:400px"></form>
<table class="tbl">
<tr><th>ID</th><th>Юзер</th><th>Сборка</th><th>★</th><th>Текст</th><th>Дата</th><th></th></tr>
{% for r in reviews %}
<tr><td>{{ r.id }}</td><td>{{ r.user.username if r.user else '—' }}</td><td>{{ r.product }}</td><td>{{ r.rating }}</td>
<td style="max-width:400px">{{ r.text }}</td><td>{{ r.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
<td><form method="post" action="{{ url_for('admin_del_review', rid=r.id) }}"><button class="btn" style="color:#ff7a9b">🗑</button></form></td></tr>
{% endfor %}</table>{% endblock %}
